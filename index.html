<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mach100-theme');
          document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="canonical" href="https://mach100.in/" />
    <meta name="theme-color" content="#070b14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f7fb" media="(prefers-color-scheme: light)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <!-- Primary SEO -->
    <title>Mach100 Tech Solutions | Custom Software Development India</title>
    <meta
      name="description"
      content="Build fast, reliable custom software in India. Production-ready fleet (MFleet), PG operations (PGPulse), and AI health tools (GluCare). 4–6 week MVPs. Request a demo today."
    />
    <meta
      name="keywords"
      content="Mach100 Tech Solutions, custom software development India, fleet management software India, PG management software, agentic AI automation, data engineering services India, business website development, MVP development Bengaluru"

    <meta name="author" content="Mach100 Tech Solutions Private Limited" />

    <meta property="og:site_name" content="Mach100 Tech Solutions" />
    <meta property="og:title" content="Mach100 Tech Solutions | Custom Software Development India" />
    <meta
      property="og:description"

    />

    <meta property="og:image:alt" content="Mach100 Tech Solutions logo" />
    <meta property="og:locale" content="en_IN" />
